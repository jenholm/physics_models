# ISR Base Configuration
project:
  name: "inflationary-sector-renormalization"
  version: "0.1.0"

simulation:
  n_trajectories: 10000
  n_efolds: 80
  dt: 0.2
  seed: 42

initial_conditions:
  sampling: "normal"       # "delta" (all at phi0) or "normal"
  sigma: 1.5               # std of normal around phi0

observable_patch:
  phi0: 2.0
  pi0: 0.0
  efold0: 0

output:
  figures_dir: "outputs/figures"
  tables_dir: "outputs/tables"
  runs_dir: "outputs/runs"

renormalization:
  cutoffs:
    n_trajectories: [100, 250, 500, 1000, 2500, 5000, 10000, 25000, 50000]
    efold_max: [10, 25, 50, 100, 150, 200]
    distance_max: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0]
    ancestry_depth: [1, 2, 3, 5, 10]

bell_locality:
  distance_bins: 20
  n_samples: 5000

kernels:
  gaussian:
    ell_values: [0.1, 0.25, 0.5, 1.0, 2.0]
  exponential:
    ell_values: [0.1, 0.25, 0.5, 1.0, 2.0]
  ancestry_proxy:
    ell_values: [1, 2, 3, 5, 10]
  # backward-compat alias
  graph:
    ell_values: [1, 2, 3, 5, 10]
  causal_cone:
    ell_values: [5, 10, 20, 50]
  same_basin:
    ell_values: [1]  # binary: same basin or not

metrics:
  epsilon: 0.0000000001
  kl_epsilon: 0.000000000001
